<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <meta charset="utf-8">
</head>

<body>
    <center>
        <h1>WELCOME TO MY COMPLETELY NORMAL LOGIN PAGE</h1>
        <form action="/login-checker" method="post">
            Enter username: <input name="username"><br>
            Enter password: <input type="password" name="password"><br>
            <button type="submit">GIVE ME YOUR INFO</button>
        </form>
        <p>No account?: <a href="/signup">Sign up</a></p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul>
                {% for message in messages %}
                    <li style="color:red;">{{ message }}</li>
                {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}
    </center>
</body>

</html>
